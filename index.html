<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>IChancy</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            overflow-x: hidden;
            padding: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .bg-image-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-image-fixed img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: slowZoom 30s ease-in-out infinite alternate;
        }
        @keyframes slowZoom {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.05);
            }
        }

        .user-status {
            display: none;
        }

        /* ===== العجلة مع إطار نيون ذهبي ===== */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            aspect-ratio: 1/1;
            display: none;
            z-index: 1;
        }
        .wheel-wrapper.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            padding: 16px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== إطار نيون ذهبي - شفاف تماماً ===== */
        .neon-frame-gold {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            border: 4px solid #FFD700;
            background: transparent !important;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), 0 0 60px rgba(255, 215, 0, 0.2), 0 0 100px rgba(255, 215, 0, 0.1);
            animation: goldNeonPulse 2.5s ease-in-out infinite;
        }

        @keyframes goldNeonPulse {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), 0 0 60px rgba(255, 215, 0, 0.2), 0 0 100px rgba(255, 215, 0, 0.1);
                border-color: #FFD700;
            }
            50% {
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.6), 0 0 100px rgba(255, 215, 0, 0.4), 0 0 150px rgba(255, 215, 0, 0.2);
                border-color: #FFA500;
            }
        }

        /* ===== حلقات نبضية ذهبية متلاشية - شفافة ===== */
        .wave-ring-gold {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 215, 0, 0.6);
            animation: waveGoldExpand 4s ease-out infinite;
            background: transparent !important;
        }

        .wave-ring-gold:nth-child(3) {
            width: 78%;
            height: 78%;
            animation-delay: 0s;
        }

        .wave-ring-gold:nth-child(4) {
            width: 85%;
            height: 85%;
            animation-delay: 1.3s;
        }

        .wave-ring-gold:nth-child(5) {
            width: 92%;
            height: 92%;
            animation-delay: 2.6s;
        }

        @keyframes waveGoldExpand {
            0% {
                transform: translate(-50%, -50%) scale(0.92);
                opacity: 0.9;
                border-width: 4px;
                border-color: rgba(255, 215, 0, 0.8);
            }
            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0;
                border-width: 1px;
                border-color: rgba(255, 215, 0, 0);
            }
        }

        /* ===== الفقاعات المتوهجة باللون الأزرق ===== */
        .glow-bubbles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: visible;
            border-radius: 50%;
        }
        .glow-bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 150, 255, 0.5), rgba(0, 100, 255, 0.05));
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.3), inset 0 0 15px rgba(0, 150, 255, 0.15);
            pointer-events: none;
            animation: floatBubble 12s infinite alternate ease-in-out;
            opacity: 0.7;
        }
        .glow-bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.7), transparent);
            opacity: 0.4;
        }

        @keyframes floatBubble {
            0% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(15px, -20px) scale(1.1);
            }
            50% {
                transform: translate(-10px, 25px) scale(0.9);
            }
            75% {
                transform: translate(20px, 10px) scale(1.05);
            }
            100% {
                transform: translate(-15px, -15px) scale(0.95);
            }
        }

        .glow-bubble:nth-child(1) {
            width: 18px;
            height: 18px;
            top: 12%;
            left: 10%;
            animation-duration: 14s;
            animation-delay: 0s;
            background: radial-gradient(circle at 30% 30%, rgba(0, 150, 255, 0.6), rgba(0, 100, 255, 0.05));
        }
        .glow-bubble:nth-child(2) {
            width: 28px;
            height: 28px;
            top: 8%;
            right: 15%;
            animation-duration: 16s;
            animation-delay: 1.2s;
            background: radial-gradient(circle at 30% 30%, rgba(0, 180, 255, 0.5), rgba(0, 120, 255, 0.03));
        }
        .glow-bubble:nth-child(3) {
            width: 14px;
            height: 14px;
            bottom: 20%;
            left: 8%;
            animation-duration: 11s;
            animation-delay: 2.5s;
            background: radial-gradient(circle at 30% 30%, rgba(0, 150, 255, 0.6), rgba(0, 100, 255, 0.04));
        }
        .glow-bubble:nth-child(4) {
            width: 22px;
            height: 22px;
            bottom: 15%;
            right: 12%;
            animation-duration: 13s;
            animation-delay: 0.7s;
            background: radial-gradient(circle at 30% 30%, rgba(0, 200, 255, 0.5), rgba(0, 130, 255, 0.03));
        }
        .glow-bubble:nth-child(5) {
            width: 16px;
            height: 16px;
            top: 45%;
            left: 4%;
            animation-duration: 15s;
            animation-delay: 3s;
            background: radial-gradient(circle at 30% 30%, rgba(0, 150, 255, 0.6), rgba(0, 100, 255, 0.04));
        }
        .glow-bubble:nth-child(6) {
            width: 20px;
            height: 20px;
            top: 40%;
            right: 5%;
            animation-duration: 12s;
            animation-delay: 1.8s;
            background: radial-gradient(circle at 30% 30%, rgba(0, 170, 255, 0.5), rgba(0, 110, 255, 0.03));
        }
        .glow-bubble:nth-child(7) {
            width: 12px;
            height: 12px;
            top: 70%;
            left: 20%;
            animation-duration: 14.5s;
            animation-delay: 0.4s;
            background: radial-gradient(circle at 30% 30%, rgba(0, 150, 255, 0.7), rgba(0, 100, 255, 0.04));
        }
        .glow-bubble:nth-child(8) {
            width: 24px;
            height: 24px;
            top: 68%;
            right: 22%;
            animation-duration: 13.5s;
            animation-delay: 2.2s;
            background: radial-gradient(circle at 30% 30%, rgba(0, 190, 255, 0.5), rgba(0, 125, 255, 0.03));
        }

        .wheel-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.3);
            border: none;
            transition: filter 0.4s ease;
            display: block;
            position: relative;
            z-index: 3;
        }
        .wheel-wrapper canvas.spinning {
            filter: brightness(1.15) drop-shadow(0 0 50px rgba(255, 215, 0, 0.12));
        }

        .pointer {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 32px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.25));
            animation: pointerBounce 2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes pointerBounce {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-5px);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.94);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .no-prizes {
            display: none;
            text-align: center;
            padding: 30px 16px;
            color: #555;
            font-size: 15px;
            background: rgba(18, 18, 18, 0.85);
            border-radius: 16px;
            backdrop-filter: blur(6px);
            max-width: 420px;
            margin: 0 auto;
            z-index: 1;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
            width: 100%;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
            z-index: 1;
            position: relative;
        }
        .btn {
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            position: relative;
        }
        .btn-spin {
            background: linear-gradient(135deg, #B8860B, #FFD700);
            color: #0a0a0a;
            box-shadow: 0 4px 30px rgba(255, 215, 0, 0.1);
            font-size: 19px;
        }
        .btn-spin:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(255, 215, 0, 0.2);
        }
        .btn-spin:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }
        .btn-spin .spinner-small {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(10, 10, 10, 0.15);
            border-top: 2px solid #0a0a0a;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        .btn-spin.loading .spinner-small {
            display: inline-block;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .deposit-notice {
            background: rgba(18, 18, 18, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.06);
            border-radius: 12px;
            padding: 10px 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(6px);
            margin-left: auto;
            margin-right: auto;
            z-index: 1;
            position: relative;
        }
        .deposit-notice.show {
            display: block;
        }
        .deposit-notice .notice-text {
            color: #FF8C00;
            font-size: 14px;
        }
        .deposit-notice .notice-text .amount {
            color: #FFD700;
            font-weight: 700;
        }
        .deposit-notice .notice-status {
            font-size: 13px;
            margin-top: 4px;
            color: #666;
        }
        .deposit-notice .notice-status .met {
            color: #00FF88;
        }
        .deposit-notice .notice-status .not-met {
            color: #FF4444;
        }

        .result-box {
            background: rgba(18, 18, 18, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.06);
            border-radius: 18px;
            padding: 18px 14px;
            margin-top: 14px;
            text-align: center;
            display: none;
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(6px);
            margin-left: auto;
            margin-right: auto;
            z-index: 1;
        }
        .result-box.show {
            display: block;
            animation: resultPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes resultPop {
            0% {
                transform: scale(0.85) rotate(-2deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        .result-box.winner {
            border-color: rgba(255, 215, 0, 0.25);
            background: rgba(255, 215, 0, 0.08);
            animation: winGlow 1.5s ease-in-out infinite alternate;
        }
        @keyframes winGlow {
            0% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.04);
            }
            100% {
                box-shadow: 0 0 80px rgba(255, 215, 0, 0.12);
            }
        }
        .result-box .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .result-box .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            opacity: 0;
            animation: confettiFall 2.2s ease-in forwards;
        }
        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-20px) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(220px) rotate(720deg) scale(0);
            }
        }

        .result-box .prize-icon {
            display: none;
        }
        .result-box .prize-name {
            display: none;
        }
        .result-box .prize-desc {
            color: #FFD700;
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
            padding: 6px 0;
        }
        .result-box.winner .prize-desc {
            background: linear-gradient(135deg, #FFD700, #FF6B00, #FFD700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldShine 1.5s ease-in-out infinite;
            font-size: 28px;
        }
        @keyframes goldShine {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .error-msg {
            background: rgba(18, 18, 18, 0.85);
            border: 1px solid rgba(255, 0, 0, 0.06);
            border-radius: 12px;
            padding: 10px;
            color: #FF6B6B;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(6px);
            margin-left: auto;
            margin-right: auto;
            z-index: 1;
            position: relative;
        }
        .error-msg.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .loading-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: #0a0a0a;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .loading-screen.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        .loading-screen .loading-image {
            width: 70vw;
            max-width: 280px;
            aspect-ratio: 1/1;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 215, 0, 0.08);
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.04);
            animation: loadingPulse 2s ease-in-out infinite;
            margin-bottom: 28px;
        }
        @keyframes loadingPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.02);
                opacity: 0.85;
            }
        }
        .loading-screen .progress-container {
            width: 60%;
            max-width: 220px;
            position: relative;
        }
        .loading-screen .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            overflow: hidden;
        }
        .loading-screen .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFD700, #FF8C00);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .loading-screen .progress-text {
            color: #888;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .sound-settings {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            padding: 6px 16px;
            background: rgba(18, 18, 18, 0.85);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(6px);
            margin-left: auto;
            margin-right: auto;
            z-index: 1;
            position: relative;
        }
        .sound-settings label {
            color: #666;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .sound-settings input[type="checkbox"] {
            accent-color: #FFD700;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .sound-settings .sound-indicator {
            color: #FFD700;
            font-size: 14px;
        }

        .admin-panel {
            display: none;
            background: rgba(18, 18, 18, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.07);
            border-radius: 20px;
            padding: 16px;
            margin-top: 14px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(6px);
            margin-left: auto;
            margin-right: auto;
            z-index: 1;
            position: relative;
        }
        .admin-panel.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        .admin-panel .panel-title {
            color: #FFD700;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-panel .panel-title .badge {
            background: #FFD700;
            color: #0a0a0a;
            font-size: 9px;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 700;
        }
        .admin-panel .prize-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 8px 10px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .admin-panel .prize-item .prize-icon-small {
            font-size: 22px;
            width: 34px;
            text-align: center;
        }
        .admin-panel .prize-item .prize-info {
            flex: 1;
            min-width: 90px;
        }
        .admin-panel .prize-item .prize-info .name-input {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 6px;
            width: 100%;
            transition: border-color 0.3s;
        }
        .admin-panel .prize-item .prize-info .name-input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .admin-panel .prize-item .prize-info .desc-input {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            color: #666;
            font-size: 10px;
            padding: 2px 6px;
            width: 100%;
            margin-top: 2px;
        }
        .admin-panel .prize-item .prize-info .desc-input:focus {
            outline: none;
            border-color: rgba(255, 215, 0, 0.3);
        }
        .admin-panel .prize-item .prize-prob {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .admin-panel .prize-item .prize-prob .prob-input {
            width: 44px;
            padding: 3px 4px;
            border-radius: 4px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #FFD700;
            font-size: 11px;
            text-align: center;
        }
        .admin-panel .prize-item .prize-prob .prob-input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .admin-panel .prize-item .prize-prob .prob-label {
            color: #555;
            font-size: 9px;
        }
        .admin-panel .prize-item .prize-prob .btn-save-prob {
            padding: 2px 8px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 4px;
            color: #FFD700;
            font-size: 9px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .admin-panel .prize-item .prize-prob .btn-save-prob:hover {
            background: rgba(255, 215, 0, 0.2);
        }
        .admin-panel .prize-item .prize-colors {
            display: flex;
            gap: 3px;
        }
        .admin-panel .prize-item .prize-colors input[type="color"] {
            width: 26px;
            height: 26px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 2px;
            background: transparent;
            cursor: pointer;
        }
        .admin-panel .prize-item .prize-colors input[type="color"]:hover {
            border-color: #FFD700;
        }
        .admin-panel .prize-item .btn-delete {
            background: rgba(255, 0, 0, 0.08);
            border: none;
            color: #FF4444;
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .admin-panel .prize-item .btn-delete:hover {
            background: rgba(255, 0, 0, 0.2);
            transform: scale(1.05);
        }
        .admin-panel .add-prize-form {
            display: flex;
            gap: 6px;
            margin-top: 10px;

        // ================================================================

        const API_BASE = 'https://zoom-ubi9.onrender.com';

        // ================================================================
        //                      نظام إعادة محاولة الاتصال
        // ================================================================
        class ConnectionManager {
            constructor() {
                this.maxRetries = 3;
                this.retryDelay = 2000;
                this.timeout = 50000;
            }

            async fetchWithRetry(url, options = {}, retryCount = 0) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), this.timeout);

                try {
                    const response = await fetch(url, {
                        ...options,
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    return response;
                } catch (error) {
                    clearTimeout(timeoutId);

                    if (error.name === 'AbortError') {
                        throw new Error('انتهت مهلة الاتصال بالخادم (50 ثانية)');
                    }

                    if (retryCount < this.maxRetries) {
                        const delay = this.retryDelay * (retryCount + 1);
                        console.log(`محاولة إعادة الاتصال ${retryCount + 1}/${this.maxRetries} بعد ${delay}ms`);
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return this.fetchWithRetry(url, options, retryCount + 1);
                    }

                    throw error;
                }
            }
        }

        const connectionManager = new ConnectionManager();

        // ================================================================
        //                      نظام الصوت الهادئ والمميز
        // ================================================================
        class AdvancedSoundManager {
            constructor() {
                this.initialized = false;
                this.audioContext = null;
                this.isPlaying = false;
                this.spinSoundInterval = null;
            }

            init() {
                if (this.initialized) return;
                try {
                    this.audioContext = new(window.AudioContext || window.webkitAudioContext)();
                    this.initialized = true;
                } catch (e) {
                    console.warn('Web Audio not supported');
                }
            }

            stopAll() {
                this.stopSpinSound();
                if (this.audioContext) {
                    try {
                        this.audioContext.close();
                        this.audioContext = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {}
                }
                this.isPlaying = false;
            }

            playSpinSound() {
                if (!soundEnabled || !this.initialized) return;
                this.stopSpinSound();
                try {
                    const ctx = this.audioContext;
                    let count = 0;

                    this.spinSoundInterval = setInterval(() => {
                        if (!soundEnabled || !this.initialized) {
                            this.stopSpinSound();
                            return;
                        }
                        try {
                            const t = ctx.currentTime;
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.connect(gain);
                            gain.connect(ctx.destination);

                            const freq = 180 + Math.sin(count * 0.7) * 25 + Math.sin(count * 0.3) * 15;
                            osc.frequency.setValueAtTime(freq, t);
                            osc.type = 'sine';

                            gain.gain.setValueAtTime(0.025, t);
                            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);

                            osc.start(t);
                            osc.stop(t + 0.07);

                            count++;
                        } catch (e) {
                            console.warn('Spin sound tick error:', e);
                        }
                    }, 110);

                    setTimeout(() => this.stopSpinSound(), 6000);
                } catch (e) {
                    console.warn('Spin sound error:', e);
                }
            }

            stopSpinSound() {
                if (this.spinSoundInterval) {
                    clearInterval(this.spinSoundInterval);
                    this.spinSoundInterval = null;
                }
            }

            playWinSound() {
                if (!soundEnabled || !this.initialized) return;
                try {
                    const ctx = this.audioContext;
                    const now = ctx.currentTime;

                    const notes = [
                        [523, 0.2, 0.06],
                        [587, 0.2, 0.06],
                        [659, 0.2, 0.06],
                        [784, 0.3, 0.07],
                        [659, 0.2, 0.06],
                        [784, 0.2, 0.06],
                        [880, 0.2, 0.06],
                        [988, 0.35, 0.08],
                        [880, 0.2, 0.06],
                        [784, 0.2, 0.06],
                        [880, 0.2, 0.06],
                        [1175, 0.4, 0.09]
                    ];

                    notes.forEach(([freq, dur, vol], i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);

                        osc.frequency.setValueAtTime(freq, now + i * 0.08);
                        osc.type = i % 2 === 0 ? 'sine' : 'triangle';

                        gain.gain.setValueAtTime(vol || 0.05, now + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + dur);

                        osc.start(now + i * 0.08);
                        osc.stop(now + i * 0.08 + dur);
                    });

                    setTimeout(() => {
                        const t = ctx.currentTime;
                        [523, 587, 659, 784].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.frequency.setValueAtTime(freq, t + i * 0.07);
                            osc.type = 'sine';
                            gain.gain.setValueAtTime(0.025, t + i * 0.07);
                            gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.25);
                            osc.start(t + i * 0.07);
                            osc.stop(t + i * 0.07 + 0.25);
                        });
                    }, notes.length * 0.08 + 0.1);

                    setTimeout(() => { this.isPlaying = false; }, 3000);
                } catch (e) {
                    console.warn('Win sound error:', e);
                    this.isPlaying = false;
                }
            }

                try {
                    const ctx = this.audioContext;

                    const notes = [
                        [440, 0.35, 0.04],
                        [370, 0.35, 0.04],
                        [330, 0.45, 0.05],
                        [247, 0.6, 0.05]
                    ];

                    notes.forEach(([freq, dur, vol], i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);

                        osc.frequency.setValueAtTime(freq, now + i * 0.25);
                        osc.type = 'sawtooth';

                        gain.gain.setValueAtTime(vol || 0.04, now + i * 0.25);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.25 + dur);

                        osc.start(now + i * 0.25);
                        osc.stop(now + i * 0.25 + dur);
                    });

                    setTimeout(() => {
                        const t = ctx.currentTime;
                        const osc2 = ctx.createOscillator();
                        const gain2 = ctx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(ctx.destination);
                        osc2.frequency.setValueAtTime(200, t);
                        osc2.frequency.exponentialRampToValueAtTime(100, t + 0.7);
                        osc2.type = 'sawtooth';
                        gain2.gain.setValueAtTime(0.02, t);
                        gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
                        osc2.start(t);
                        osc2.stop(t + 0.7);
                    }, notes.length * 0.25 + 0.1);

                    setTimeout(() => { this.isPlaying = false; }, 2000);
                } catch (e) {
                    console.warn('Lose sound error:', e);
                    this.isPlaying = false;
                }
            }

            playStartSound() {
                if (!soundEnabled || !this.initialized) return;
                try {
                    const ctx = this.audioContext;
                    const now = ctx.currentTime;

                    [440, 554, 659].forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.frequency.setValueAtTime(freq, now + i * 0.1);
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.02, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.12);
                        osc.start(now + i * 0.1);
                        osc.stop(now + i * 0.1 + 0.12);
                    });
                } catch (e) {
                    console.warn('Start sound error:', e);
                }
            }
        }

        // ================================================================
        //                      رسم العجلة
        // ================================================================
        function drawWheel(prizes, highlightIndex = -1, rotation = 0) {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width,
                h = canvas.height;
            const cx = w / 2,
                cy = h / 2;
            const r = Math.min(w, h) / 2 - 12;
            const noPrizes = document.getElementById('noPrizes');
            const wrapper = document.getElementById('wheelWrapper');

            if (!prizes || prizes.length === 0) {
                noPrizes.style.display = 'block';
                wrapper.classList.remove('show');
                return;
            }

            noPrizes.style.display = 'none';
            wrapper.classList.add('show');
            ctx.clearRect(0, 0, w, h);

            const total = prizes.length;
            const step = (2 * Math.PI) / total;

            prizes.forEach((p, i) => {
                const start = i * step + rotation - Math.PI / 2;
                const end = start + step;
                const isHighlight = (i === highlightIndex);

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, start, end);
                ctx.closePath();

                const color1 = p.color || '#1a1a2e';
                const color2 = p.color2 || '#16213e';
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);

                if (isHighlight) {
                    grad.addColorStop(0, '#FFD700');
                    grad.addColorStop(0.5, '#FF8C00');
                    grad.addColorStop(1, '#B8860B');
                } else {
                    grad.addColorStop(0, color1);
                    grad.addColorStop(1, color2);
                }
                ctx.fillStyle = grad;
                ctx.fill();

                if (isHighlight) {
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 50;
                } else {
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }

                ctx.strokeStyle = isHighlight ? '#FFD700' : 'rgba(255,215,0,0.05)';
                ctx.lineWidth = isHighlight ? 2.5 : 0.5;
                ctx.stroke();
                ctx.shadowBlur = 0;

                const mid = start + step / 2;
                const tr = r * 0.62;
                const x = cx + Math.cos(mid) * tr;
                const y = cy + Math.sin(mid) * tr;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(mid + (mid > Math.PI / 2 ? Math.PI : 0));

                ctx.fillStyle = isHighlight ? '#0a0a0a' : '#fff';
                ctx.font = isHighlight ? 'bold 19px sans-serif' : '17px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 8;
                ctx.fillText(p.icon || '🎁', 0, 0);
                ctx.shadowBlur = 0;
                ctx.restore();
            });

            const centerR = r * 0.16;
            const centerIcon = settingsCache.center_icon || '⭐';

            const grad = ctx.createRadialGradient(cx - 4, cy - 4, 0, cx, cy, centerR);
            grad.addColorStop(0, '#FFD700');
            grad.addColorStop(0.3, '#FFA500');
            grad.addColorStop(0.7, '#FF8C00');
            grad.addColorStop(1, '#B8860B');

            ctx.beginPath();
            ctx.arc(cx, cy, centerR, 0, 2 * Math.PI);
            ctx.fillStyle = grad;
            ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
            ctx.shadowBlur = 40;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.beginPath();
            ctx.arc(cx, cy, centerR + 5, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#0a0a0a';
            ctx.font = '32px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            ctx.fillText(centerIcon, cx, cy + 1);
            ctx.shadowBlur = 0;
        }

        // ================================================================
        //                      دوران العجلة
        // ================================================================
        function animateSpin(targetRotation, duration, callback) {
            const canvas = document.getElementById('wheelCanvas');
            canvas.classList.add('spinning');

            const startRotation = currentRotation;
            const startTime = performance.now();

            function animate(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOutCubic = 1 - Math.pow(1 - progress, 3);
                const easedProgress = easeOutCubic;

                const currentAngle = startRotation + (targetRotation - startRotation) * easedProgress;
                currentRotation = currentAngle;

                drawWheel(prizesCache, -1, currentAngle);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentRotation = targetRotation;
                    canvas.classList.remove('spinning');
                    if (callback) callback();
                }
            }

            requestAnimationFrame(animate);
        }

                const size = 6 + Math.random() * 14;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.top = Math.random() * 40 + '%';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
                el.style.animationDelay = Math.random() * 0.8 + 's';
                container.appendChild(el);
            }
            setTimeout(() => { container.innerHTML = ''; }, 3500);
        }

        function createWinEffects(prizeName) {
            const resultBox = document.getElementById('resultBox');
            resultBox.classList.add('winner');
            const name = document.getElementById('prizeName');
            name.classList.add('win-text');
            createConfetti(60);
            showNotification(`🎉 مبروك! لقد فزت بـ ${prizeName}!`);
        }

        function clearWinEffects() {
            const resultBox = document.getElementById('resultBox');
            resultBox.classList.remove('winner');
            const name = document.getElementById('prizeName');
            name.classList.remove('win-text');
        }

        function showNotification(message) {
            const bar = document.getElementById('notificationBar');
            document.getElementById('notifPrizeName').textContent = message.replace('🎉 مبروك! لقد فزت بـ ', '').replace('!',
            '');
            bar.classList.add('show');
            setTimeout(() => { bar.classList.remove('show'); }, 4000);
        }

        // ================================================================
        //                      شاشة اللودينغ
        // ================================================================
        function updateLoading(progress) {
            const bar = document.getElementById('loaderProgressBar');
            const text = document.getElementById('loaderStatusText');
            bar.style.width = progress + '%';
            text.textContent = progress + '%';
        }

        function showLoading(show) {
            const screen = document.getElementById('loadingScreen');
            const wrapper = document.getElementById('wheelWrapper');
            if (show) {
                screen.classList.add('active');
                wrapper.classList.remove('show');
            } else {
                screen.classList.remove('active');
                wrapper.classList.add('show');
            }
        }

        // ================================================================
        //                      التحقق من الاتصال مع إعادة المحاولة
        // ================================================================
        async function checkConnection() {
            try {
                await connectionManager.fetchWithRetry(`${API_BASE}/api/status`);
                return true;
            } catch (e) {
                console.error('Connection failed:', e);
                return false;
            }
        }

        // ================================================================
        //                      تدوير العجلة
        // ================================================================
        async function spinWheel() {
            if (isSpinning || !USER_ID) return;
            if (document.getElementById('spinBtn').disabled) return;
            if (prizesCache.length === 0) {
                showError('لا توجد جوائز متاحة');
                return;
            }

            isSpinning = true;
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;
            spinBtn.classList.add('loading');
            document.getElementById('spinBtnText').textContent = 'جاري التدوير...';

            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
            clearWinEffects();

            soundManager.init();
            soundManager.playStartSound();
            soundManager.playSpinSound();

            try {
                const response = await connectionManager.fetchWithRetry(`${API_BASE}/api/wheel/spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: USER_ID })
                });

                const data = await response.json();
                spinBtn.classList.remove('loading');

                if (data.success) {
                    const prize = data.spin.prize;
                    const step = (2 * Math.PI) / prizesCache.length;

                    const prizeIndex = prizesCache.findIndex(p => p.id === prize.id);
                    const isWin = !prize.name.includes('حظ سعيد');

                    if (prizeIndex === -1) {
                        const randomIndex = Math.floor(Math.random() * prizesCache.length);
                        const targetAngle = (randomIndex / prizesCache.length) * 2 * Math.PI;
                        const totalRotation = currentRotation + (4 * 2 * Math.PI) + (2 * Math.PI - targetAngle - (step /
                            2));

                        animateSpin(totalRotation, spinDuration, () => {
                            drawWheel(prizesCache, randomIndex, totalRotation);
                            showResult(prizesCache[randomIndex], isWin);
                        });
                    } else {
                        const targetAngle = (prizeIndex / prizesCache.length) * 2 * Math.PI;
                        const totalRotation = currentRotation + (4 * 2 * Math.PI) + (2 * Math.PI - targetAngle - (step /
                            2));

                        animateSpin(totalRotation, spinDuration, () => {
                            drawWheel(prizesCache, prizeIndex, totalRotation);
                            showResult(prize, isWin);
                        });
                    }

                } else {
                    showError(data.error || 'حدث خطأ');
                    if (data.remaining_hours !== undefined) {
                        const btn = document.getElementById('spinBtn');
                        btn.disabled = true;
                        document.getElementById('spinBtnText').textContent = `⏳ ${data.remaining_hours}h ${data.remaining_minutes}m`;
                        soundManager.stopAll();
                    }
                    drawWheel(prizesCache, -1, currentRotation);
                }

            } catch (e) {
                spinBtn.classList.remove('loading');
                showError('خطأ في الاتصال: ' + e.message);
                drawWheel(prizesCache, -1, currentRotation);
                soundManager.stopAll();
            }

            isSpinning = false;
            if (!document.getElementById('spinBtn').disabled) {
                document.getElementById('spinBtnText').textContent = '🎰 تدوير العجلة';
            }
        }

        // ================================================================
        //                      عرض النتيجة
        // ================================================================
        function showResult(prize, isWin) {
            document.getElementById('prizeDesc').textContent = prize.description || prize.name || 'جائزة!';
            document.getElementById('resultBox').classList.add('show');

            soundManager.stopAll();

            if (isWin) {
                createWinEffects(prize.description || prize.name);
                soundManager.playWinSound();
            } else {
                soundManager.playLoseSound();
            }

            loadUserStatus();
        }

        // ================================================================
        //                      عرض الخطأ
        // ================================================================
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            document.getElementById('errorText').textContent = '❌ ' + msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        // ================================================================
        //                      أحداث الإدارة
        // ================================================================
        document.querySelectorAll('.btn-save').forEach(btn => {
            btn.addEventListener('click', async function() {
                const key = this.dataset.setting;
                const fieldId = this.dataset.field;
                const type = this.dataset.type || 'text';
                let value = '';
                if (type === 'checkbox') {
                    value = document.getElementById(fieldId).checked;
                } else {
                    value = document.getElementById(fieldId).value;
                }
                const originalText = this.textContent;
                this.textContent = '⏳ جاري...';
                this.disabled = true;
                const success = await saveSetting(key, value);
                if (success) {
                    this.textContent = '✅ تم الحفظ';
                    this.classList.add('saved');
                    await refreshAll();
                    setTimeout(() => {
                        this.textContent = originalText;
                        this.classList.remove('saved');
                        this.disabled = false;
                    }, 2000);
                } else {
                    this.textContent = '❌ فشل';
                    setTimeout(() => {
                        this.textContent = originalText;
                        this.disabled = false;
                    }, 2000);
                }
            });
        });

        document.getElementById('addPrizeBtn').addEventListener('click', async function() {
            const nameInput = document.getElementById('newPrizeName');
            const iconInput = document.getElementById('newPrizeIcon');
            const descInput = document.getElementById('newPrizeDesc');
            const probInput = document.getElementById('newPrizeProb');
            const colorInput = document.getElementById('newPrizeColor');
            const color2Input = document.getElementById('newPrizeColor2');

            const name = nameInput.value.trim();
            const icon = iconInput.value.trim() || '🎁';
            const description = descInput.value.trim() || '';
            const prob = parseFloat(probInput.value) || 10;
            const color = colorInput.value || '#1a1a2e';
            const color2 = color2Input.value || '#16213e';

            if (!name) {
                showError('⚠️ الرجاء إدخال اسم الجائزة');
                nameInput.focus();
                return;
            }
            if (prob < 0 || prob > 100) {
                showError('⚠️ النسبة يجب أن تكون بين 0 و 100');
                probInput.focus();
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.textContent = '⏳';

            const success = await addPrize(name, icon, description, prob, color, color2);
            if (success) {
                nameInput.value = '';
                iconInput.value = '';
                descInput.value = '';
                probInput.value = '';
                await refreshAll();
                showNotification(`✅ تم إضافة "${name}" بنجاح`);
            } else {
                showError('❌ فشل إضافة الجائزة');
            }
            btn.disabled = false;
            btn.textContent = '➕';
        });

        document.getElementById('refreshPrizesBtn').addEventListener('click', async function() {
            await refreshAll();
            showNotification('🔄 تم تحديث الكل');
        });

        document.getElementById('resetPrizesBtn').addEventListener('click', async function() {
            if (confirm('⚠️ هل أنت متأكد من إعادة تعيين جميع الجوائز إلى الإعدادات الافتراضية؟')) {
                const success = await resetPrizes();
                if (success) {
                    await refreshAll();
                    showNotification('✅ تم إعادة تعيين الجوائز');
                } else {
                    showError('❌ فشل إعادة التعيين');
                }
            }
        });

        document.getElementById('soundToggle').addEventListener('change', function() {
            soundEnabled = this.checked;
            if (!soundEnabled) {
                soundManager.stopAll();
            } else {
                soundManager.init();
            }
        });

        // ================================================================
        //                      التهيئة
        // ================================================================
        async function init() {
            USER_ID = getUserId();

            if (!USER_ID) {
                document.getElementById('errorContainer').classList.add('show');
                document.getElementById('userStatus').style.display = 'none';
                return;
            }

            showLoading(true);
            updateLoading(0);

            try {
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 12;
                    if (progress > 85) progress = 85;
                    updateLoading(Math.round(progress));
                }, 150);

                const isConnected = await checkConnection();
                if (!isConnected) {
                    clearInterval(interval);
                    updateLoading(100);
                    await new Promise(r => setTimeout(r, 400));
                    showLoading(false);
                    showError('⚠️ لا يمكن الاتصال بالخادم. تأكد من اتصالك بالإنترنت.');
                    return;
                }

                updateLoading(30);
                await new Promise(r => setTimeout(r, 300));

                await loadSettings();
                updateLoading(50);
                await new Promise(r => setTimeout(r, 300));

                const prizes = await loadPrizes();
                drawWheel(prizes, -1, 0);
                updateLoading(70);
                await new Promise(r => setTimeout(r, 300));

                await loadUserStatus();
                updateLoading(85);
                await new Promise(r => setTimeout(r, 300));

                await renderAdminPanel();
                updateLoading(95);
                await new Promise(r => setTimeout(r, 300));

                clearInterval(interval);
                updateLoading(100);
                await new Promise(r => setTimeout(r, 500));

                soundManager.init();

            } catch (e) {
                console.error('Init error:', e);
                updateLoading(100);
                await new Promise(r => setTimeout(r, 600));
                showError('⚠️ فشل تحميل البيانات: ' + e.message);
            }

            showLoading(false);
            document.getElementById('spinBtn').onclick = spinWheel;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
