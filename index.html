<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>IChancy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: #0b0b14; /* خلفية داكنة جداً لإبراز الإشعاع */
            overflow-x: hidden;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; /* لمنع التمرير عند تشغيل الأضواء */
        }

        .bg-image-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, #1a1a3e 0%, #05050a 100%);
        }

        /* === النصوص العلوية === */
        .top-header {
            width: 100%; max-width: 420px; text-align: center;
            z-index: 10; margin-top: 20px; margin-bottom: 15px;
            position: relative; color: #e5c07b;
        }
        .top-header .title-status {
            font-size: 18px; font-weight: 700; color: #e5c07b;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }
        .top-header .sub-title {
            font-size: 14px; color: #d4af37; margin-top: 8px; line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .top-header .sub-title .gold { color: #ffd700; font-weight: bold; }

        /* ===== العجلة ===== */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            aspect-ratio: 1/1;
            display: none;
            z-index: 1;
            margin-bottom: 5px;
        }
        .wheel-wrapper.show { display: block; animation: fadeIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .wheel-container {
            position: relative; width: 100%; height: 100%;
            border-radius: 50%;
            /* وهج خلفي دائري للعجلة بأكملها */
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.05), inset 0 0 50px rgba(255, 215, 0, 0.02);
            display: flex; align-items: center; justify-content: center;
        }

        /* ===== السهم المضيء ===== */
        .pointer {
            position: absolute;
            top: -6px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 40px solid #ffea8c;
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.8));
            pointer-events: none;
        }
        .pointer::after {
            content: '';
            position: absolute; top: -46px; left: -13px;
            width: 26px; height: 26px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #f5b200);
            border-radius: 50%;
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.3), 0 0 30px #f5b200;
        }
        /* لمعان السهم */
        .pointer::before {
            content: '';
            position: absolute; top: -50px; left: -5px;
            width: 10px; height: 40px;
            background: linear-gradient(180deg, rgba(255,255,255,0.8), transparent);
            transform: rotate(-25deg);
            filter: blur(4px);
        }

        .wheel-wrapper canvas {
            width: 100% !important; height: 100% !important;
            border-radius: 50%;
            display: block; position: relative; z-index: 3;
            transition: filter 0.3s ease;
        }
        .wheel-wrapper canvas.spinning {
            /* تأثير دوران العجلة */
            filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.2)) brightness(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9) rotate(-10deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* ===== باقي العناصر (محتفظ بها من الكود الأصلي للعمل) ===== */
        .actions { display: flex; justify-content: center; width: 100%; max-width: 380px; z-index: 1; position: relative; margin-top: 0px; }
        .btn { padding: 18px 40px; border: none; border-radius: 30px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; width: 100%; max-width: 300px; position: relative; box-shadow: 0 4px 30px rgba(255, 215, 0, 0.1); }
        .btn-spin { background: linear-gradient(180deg, #fceabb, #d4af37); color: #0a0a0a; border: 1px solid rgba(255,255,255,0.2); }
        .btn-spin:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(255, 215, 0, 0.3); }
        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: grayscale(0.5); }
        .btn-spin .spinner-small { display: none; width: 20px; height: 20px; border: 2px solid rgba(10, 10, 10, 0.15); border-top: 2px solid #0a0a0a; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 10px; vertical-align: middle; }
        .btn-spin.loading .spinner-small { display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-spin .btn-target-icon { display: inline-block; margin-left: 8px; font-size: 18px; }

        .result-box { background: rgba(18, 18, 18, 0.85); border: 1px solid rgba(255, 215, 0, 0.15); border-radius: 18px; padding: 18px 14px; margin-top: 14px; text-align: center; display: none; position: relative; overflow: hidden; width: 100%; max-width: 380px; backdrop-filter: blur(10px); margin-left: auto; margin-right: auto; z-index: 1; }
        .result-box.show { display: block; animation: resultPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes resultPop { 0% { transform: scale(0.85) rotate(-2deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .result-box.winner { border-color: rgba(255, 215, 0, 0.5); background: rgba(255, 215, 0, 0.08); animation: winGlow 1.5s ease-in-out infinite alternate; }
        @keyframes winGlow { 0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.04); } 100% { box-shadow: 0 0 80px rgba(255, 215, 0, 0.2); } }
        .result-box .confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .result-box .confetti { position: absolute; width: 12px; height: 12px; opacity: 0; animation: confettiFall 2.2s ease-in forwards; }
        @keyframes confettiFall { 0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); } 100% { opacity: 0; transform: translateY(220px) rotate(720deg) scale(0); } }
        .result-box .prize-desc { color: #FFD700; font-size: 24px; font-weight: 700; margin-top: 4px; padding: 6px 0; }
        .result-box.winner .prize-desc { background: linear-gradient(135deg, #FFD700, #FF6B00, #FFD700); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: goldShine 1.5s ease-in-out infinite; font-size: 28px; }
        @keyframes goldShine { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .error-msg { background: rgba(18, 18, 18, 0.85); border: 1px solid rgba(255, 0, 0, 0.06); border-radius: 12px; padding: 10px; color: #FF6B6B; text-align: center; font-size: 14px; margin-top: 10px; display: none; width: 100%; max-width: 380px; backdrop-filter: blur(6px); margin-left: auto; margin-right: auto; z-index: 1; position: relative; }
        .error-msg.show { display: block; animation: fadeIn 0.3s ease; }

        .loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; background: #0a0a0a; flex-direction: column; align-items: center; justify-content: center; padding: 20px; margin: 0; }
        .loading-screen.active { display: flex; animation: fadeIn 0.3s ease; }
        .loading-screen .loading-image { width: 70vw; max-width: 280px; aspect-ratio: 1/1; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255, 215, 0, 0.08); box-shadow: 0 0 80px rgba(255, 215, 0, 0.04); animation: loadingPulse 2s ease-in-out infinite; margin-bottom: 28px; }
        @keyframes loadingPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.02); opacity: 0.85; } }
        .loading-screen .progress-container { width: 60%; max-width: 220px; position: relative; }
        .loading-screen .progress-bar-bg { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.04); border-radius: 4px; overflow: hidden; }
        .loading-screen .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #FFD700, #FF8C00); border-radius: 4px; transition: width 0.3s ease; }
        .loading-screen .progress-text { color: #888; font-size: 14px; margin-top: 12px; text-align: center; font-weight: 600; letter-spacing: 1px; }

        .sound-settings { display: flex; justify-content: center; gap: 20px; margin-top: 10px; padding: 6px 16px; background: rgba(18, 18, 18, 0.85); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.04); width: 100%; max-width: 380px; backdrop-filter: blur(6px); margin-left: auto; margin-right: auto; z-index: 1; position: relative; }
        .sound-settings label { color: #666; font-size: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .sound-settings input[type="checkbox"] { accent-color: #FFD700; width: 16px; height: 16px; cursor: pointer; }
        .sound-settings .sound-indicator { color: #FFD700; font-size: 14px; }

        .admin-panel { display: none; background: rgba(18, 18, 18, 0.85); border: 1px solid rgba(255, 215, 0, 0.07); border-radius: 20px; padding: 16px; margin-top: 14px; width: 100%; max-width: 420px; backdrop-filter: blur(6px); margin-left: auto; margin-right: auto; z-index: 1; position: relative; }
        .admin-panel.show { display: block; animation: fadeIn 0.4s ease; }
        .admin-panel .panel-title { color: #FFD700; font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .admin-panel .panel-title .badge { background: #FFD700; color: #0a0a0a; font-size: 9px; padding: 2px 12px; border-radius: 20px; font-weight: 700; }
        .admin-panel .prize-item { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 10px; padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .admin-panel .prize-item .prize-icon-small { font-size: 22px; width: 34px; text-align: center; }
        .admin-panel .prize-item .prize-info { flex: 1; min-width: 90px; }
        .admin-panel .prize-item .prize-info .name-input { background: transparent; border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 4px; color: #fff; font-size: 12px; font-weight: 600; padding: 2px 6px; width: 100%; transition: border-color 0.3s; }
        .admin-panel .prize-item .prize-info .name-input:focus { outline: none; border-color: #FFD700; }
        .admin-panel .prize-item .prize-info .desc-input { background: transparent; border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 4px; color: #666; font-size: 10px; padding: 2px 6px; width: 100%; margin-top: 2px; }
        .admin-panel .prize-item .prize-info .desc-input:focus { outline: none; border-color: rgba(255, 215, 0, 0.3); }
        .admin-panel .prize-item .prize-prob { display: flex; align-items: center; gap: 3px; }
        .admin-panel .prize-item .prize-prob .prob-input { width: 44px; padding: 3px 4px; border-radius: 4px; border: 1px solid rgba(255, 215, 0, 0.1); background: rgba(0, 0, 0, 0.3); color: #FFD700; font-size: 11px; text-align: center; }
        .admin-panel .prize-item .prize-prob .prob-input:focus { outline: none; border-color: #FFD700; }
        .admin-panel .prize-item .prize-prob .prob-label { color: #555; font-size: 9px; }
        .admin-panel .prize-item .prize-prob .btn-save-prob { padding: 2px 8px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.1); border-radius: 4px; color: #FFD700; font-size: 9px; cursor: pointer; transition: all 0.3s; }
        .admin-panel .prize-item .prize-prob .btn-save-prob:hover { background: rgba(255, 215, 0, 0.2); }
        .admin-panel .prize-item .prize-colors { display: flex; gap: 3px; }
        .admin-panel .prize-item .prize-colors input[type="color"] { width: 26px; height: 26px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; padding: 2px; background: transparent; cursor: pointer; }
        .admin-panel .prize-item .prize-colors input[type="color"]:hover { border-color: #FFD700; }
        .admin-panel .prize-item .btn-delete { background: rgba(255, 0, 0, 0.08); border: none; color: #FF4444; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .admin-panel .prize-item .btn-delete:hover { background: rgba(255, 0, 0, 0.2); transform: scale(1.05); }
        .admin-panel .add-prize-form { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
        .admin-panel .add-prize-form input { flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255, 215, 0, 0.1); background: rgba(0, 0, 0, 0.3); color: #fff; font-size: 11px; min-width: 50px; }
        .admin-panel .add-prize-form input:focus { outline: none; border-color: #FFD700; }
        .admin-panel .add-prize-form input::placeholder { color: #555; }
        .admin-panel .add-prize-form .btn-add { padding: 6px 16px; background: linear-gradient(135deg, #B8860B, #FFD700); border: none; border-radius: 6px; color: #0a0a0a; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.3s; }
        .admin-panel .add-prize-form .btn-add:hover { transform: scale(1.05); }
        .admin-panel .add-prize-form .btn-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .admin-panel .panel-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .admin-panel .panel-actions .btn-action { padding: 5px 14px; border: 1px solid rgba(255, 215, 0, 0.1); border-radius: 6px; background: rgba(255, 255, 255, 0.02); color: #FFD700; font-size: 10px; cursor: pointer; transition: all 0.3s; }
        .admin-panel .panel-actions .btn-action:hover { background: rgba(255, 215, 0, 0.05); border-color: #FFD700; }
        .admin-panel .panel-actions .btn-action.danger { color: #FF4444; border-color: rgba(255, 0, 0, 0.1); }
        .admin-panel .panel-actions .btn-action.danger:hover { background: rgba(255, 0, 0, 0.05); border-color: #FF4444; }
        .admin-panel .settings-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255, 255, 255, 0.04); }
        .admin-panel .settings-section .setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .admin-panel .settings-section .setting-row label { color: #888; font-size: 11px; min-width: 70px; }
        .admin-panel .settings-section .setting-row input, .admin-panel .settings-section .setting-row textarea { flex: 1; padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(255, 215, 0, 0.1); background: rgba(0, 0, 0, 0.3); color: #fff; font-size: 11px; min-width: 60px; }
        .admin-panel .settings-section .setting-row input:focus, .admin-panel .settings-section .setting-row textarea:focus { outline: none; border-color: #FFD700; }
        .admin-panel .settings-section .setting-row .btn-save { padding: 4px 14px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 4px; color: #FFD700; font-size: 10px; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .admin-panel .settings-section .setting-row .btn-save:hover { background: rgba(255, 215, 0, 0.2); }
        .admin-panel .settings-section .setting-row .btn-save.saved { background: rgba(0, 255, 100, 0.1); border-color: rgba(0, 255, 100, 0.2); color: #00FF88; }
        .admin-panel .settings-section .toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .admin-panel .settings-section .toggle-row label { color: #888; font-size: 11px; min-width: 70px; }
        .admin-panel .settings-section .toggle-row input[type="checkbox"] { accent-color: #FFD700; width: 16px; height: 16px; cursor: pointer; }
        .admin-panel .settings-section .toggle-row .btn-save { padding: 4px 14px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 4px; color: #FFD700; font-size: 10px; cursor: pointer; transition: all 0.3s; }
        .admin-panel .settings-section .toggle-row .btn-save:hover { background: rgba(255, 215, 0, 0.2); }
        .admin-panel .settings-section .toggle-row .btn-save.saved { background: rgba(0, 255, 100, 0.1); border-color: rgba(0, 255, 100, 0.2); color: #00FF88; }

        .error-container { display: none; text-align: center; padding: 30px 16px; background: rgba(18, 18, 18, 0.85); border-radius: 20px; backdrop-filter: blur(6px); max-width: 420px; margin: 0 auto; z-index: 1; position: relative; }
        .error-container.show { display: block; animation: fadeIn 0.5s ease; }
        .error-container .error-icon { font-size: 44px; margin-bottom: 10px; }
        .error-container .error-title { color: #FFD700; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .error-container .error-text { color: #777; font-size: 14px; line-height: 1.6; }
        .error-container .error-text .highlight { color: #FFD700; }
        .error-container .btn-open-bot { margin-top: 16px; padding: 12px 32px; background: linear-gradient(135deg, #B8860B, #FFD700); border: none; border-radius: 14px; color: #0a0a0a; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .error-container .btn-open-bot:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 215, 0, 0.15); }

        .notification-bar { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #FFD700, #FF8C00); color: #0a0a0a; padding: 14px 28px; border-radius: 16px; font-size: 17px; font-weight: 700; z-index: 1000; box-shadow: 0 10px 60px rgba(255, 215, 0, 0.25); animation: notifSlideDown 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); max-width: 90%; text-align: center; }
        .notification-bar.show { display: block; }
        @keyframes notifSlideDown { 0% { transform: translateX(-50%) translateY(-100px); opacity: 0; } 100% { transform: translateX(-50%) translateY(0); opacity: 1; } }

        @media (max-width: 480px) {
            .btn { font-size: 16px; padding: 14px 16px; }
            .btn-spin { font-size: 17px; }
            .pointer { border-left-width: 14px; border-right-width: 14px; border-top-width: 30px; top: -4px; }
            .pointer::after { width: 18px; height: 18px; top: -36px; left: -9px; }
            .result-box .prize-desc { font-size: 20px; }
            .result-box.winner .prize-desc { font-size: 24px; }
            .top-header .title-status { font-size: 16px; }
            .top-header .sub-title { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="bg-image-fixed"></div>

    <div class="notification-bar" id="notificationBar">
        🎉 مبروك! لقد فزت بـ <span id="notifPrizeName">جائزة</span>!
    </div>

    <div class="error-container" id="errorContainer">
        <div class="error-icon">⚠️</div>
        <div class="error-title">يجب الدخول من البوت</div>
        <div class="error-text">لا يمكن الوصول إلى معرف المستخدم.<br>يرجى فتح العجلة من خلال <span class="highlight">بوت IChancy</span>.</div>
        <button class="btn-open-bot" onclick="window.open('https://t.me/IChancyBot', '_blank')">🚀 فتح البوت</button>
    </div>

    <div class="loading-screen" id="loadingScreen">
        <img class="loading-image" id="loadingImage" src="https://via.placeholder.com/200/1a1a2e/FFD700?text=🎡" alt="Loading">
        <div class="progress-container">
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="loaderProgressBar"></div></div>
            <div class="progress-text" id="loaderStatusText">0%</div>
        </div>
    </div>

    <div class="top-header">
        <div class="title-status">🔒 لا تملك أي لفة حالياً</div>
        <div class="sub-title">
            💰 أودع <span class="gold">50,000</span> ل.س أو أكثر اليوم<br>
            واحصل على لفة مجانية!<br>
            👥 أو اجمع <span class="gold">5</span> إحالات نشطة اليوم لتحصل<br>
            على لفة
        </div>
    </div>

    <div class="wheel-wrapper" id="wheelWrapper">
        <div class="wheel-container">
            <div class="pointer" id="pointer"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-spin" id="spinBtn" disabled>
            <span class="spinner-small"></span>
            <span id="spinBtnText">دَوِّر العجلة!</span>
            <span class="btn-target-icon">🎯</span>
        </button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="confetti-container" id="confettiContainer"></div>
        <div class="prize-desc" id="prizeDesc"></div>
    </div>

    <div class="sound-settings">
        <label><span class="sound-indicator">🔊</span><input type="checkbox" id="soundToggle" checked> مؤثرات</label>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="panel-title">⚙️ لوحة الإدارة <span class="badge">ADMIN</span></div>
        <div id="prizesList"></div>
        <div class="add-prize-form">
            <input type="text" id="newPrizeName" placeholder="الاسم"><input type="text" id="newPrizeIcon" placeholder="🎁" style="max-width:44px;">
            <input type="text" id="newPrizeDesc" placeholder="الوصف" style="flex:1.5;"><input type="number" id="newPrizeProb" placeholder="نسبة" style="max-width:55px;">
            <input type="color" id="newPrizeColor" value="#1f2b4a" style="max-width:34px;padding:2px;">
            <input type="color" id="newPrizeColor2" value="#111d35" style="max-width:34px;padding:2px;">
            <button class="btn-add" id="addPrizeBtn">➕</button>
        </div>
        <div class="panel-actions">
            <button class="btn-action" id="refreshPrizesBtn">🔄 تحديث الكل</button>
            <button class="btn-action danger" id="resetPrizesBtn">🗑️ إعادة تعيين</button>
        </div>

    <script>
        // ================================================================
        //                      الإعدادات الأساسية
        // ================================================================
        const API_BASE = 'https://joj-d0kl.onrender.com';

        let USER_ID = null;

        // دوال الاتصال والعرض (محتفظ بها من الكود الأصلي للحفاظ على الوظائف)
        class ConnectionManager {
            constructor() { this.maxRetries = 3; this.retryDelay = 2000; this.timeout = 50000; }
            async fetchWithRetry(url, options = {}, retryCount = 0) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), this.timeout);
                try {
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response;
                } catch (error) {
                    clearTimeout(timeoutId);
                    if (error.name === 'AbortError') throw new Error('انتهت مهلة الاتصال بالخادم (50 ثانية)');
                    if (retryCount < this.maxRetries) {
                        await new Promise(resolve => setTimeout(resolve, this.retryDelay * (retryCount + 1)));
                        return this.fetchWithRetry(url, options, retryCount + 1);
                    }
                    throw error;
                }
            }
        }
        const connectionManager = new ConnectionManager();

        // ====== نظام الصوت ======
        class AdvancedSoundManager {
            constructor() { this.initialized = false; this.audioContext = null; this.spinSoundInterval = null; }
            init() {
                if (this.initialized) return;
                try { this.audioContext = new (window.AudioContext || window.webkitAudioContext)(); this.initialized = true; } catch (e) {}
            }
            stopAll() {
                if (this.spinSoundInterval) clearInterval(this.spinSoundInterval);
                this.spinSoundInterval = null;
                if (this.audioContext) try { this.audioContext.close(); this.audioContext = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
            }
            playSpinSound() {
                if (!soundEnabled || !this.initialized) return;
                this.stopAll();
                try {
                    const ctx = this.audioContext;
                    let count = 0;
                    this.spinSoundInterval = setInterval(() => {
                        if (!soundEnabled) { this.stopAll(); return; }
                        try {
                            const t = ctx.currentTime;
                            const osc = ctx.createOscillator(); const gain = ctx.createGain();
                            osc.connect(gain); gain.connect(ctx.destination);
                            osc.frequency.setValueAtTime(180 + Math.sin(count * 0.7) * 25, t);
                            gain.gain.setValueAtTime(0.025, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
                            osc.start(t); osc.stop(t + 0.07);
                            count++;
                        } catch (e) {}
                    }, 110);
                } catch (e) {}
            }
            playWinSound() {
                if (!soundEnabled || !this.initialized) return;
                try {
                    const ctx = this.audioContext; const now = ctx.currentTime;
                    const notes = [[523,0.2],[587,0.2],[659,0.2],[784,0.3]];
                    notes.forEach(([freq, dur], i) => {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.frequency.setValueAtTime(freq, now + i * 0.08);
                        gain.gain.setValueAtTime(0.05, now + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + dur);
                        osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + dur);
                    });
                } catch (e) {}
            }
            playLoseSound() {
                if (!soundEnabled || !this.initialized) return;
                try {
                    const ctx = this.audioContext; const now = ctx.currentTime;
                    const notes = [[440,0.35],[370,0.35],[330,0.45],[247,0.6]];
                    notes.forEach(([freq, dur], i) => {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.frequency.setValueAtTime(freq, now + i * 0.25);
                        gain.gain.setValueAtTime(0.04, now + i * 0.25);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.25 + dur);
                        osc.start(now + i * 0.25); osc.stop(now + i * 0.25 + dur);
                    });
                } catch (e) {}
            }
            playStartSound() {
                if (!soundEnabled || !this.initialized) return;
                try {
                    const ctx = this.audioContext; const now = ctx.currentTime;
                    [440, 554, 659].forEach((freq, i) => {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.frequency.setValueAtTime(freq, now + i * 0.1);
                        gain.gain.setValueAtTime(0.02, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.12);
                        osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.12);
                    });
                } catch (e) {}
            }
        }
        const soundManager = new AdvancedSoundManager();

        function getUserId() {

        // ================================================================
        //      الرسم المتقدم (مع أضواء الـ Chase واللمعان المعدني)
        // ================================================================
        let lightFrameOffset = 0;
        let animationFrameId = null;

        function drawWheel(prizes, highlightIndex = -1, rotation = 0) {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const cx = w / 2, cy = h / 2;
            const r = Math.min(w, h) / 2 - 16;
            const noPrizes = document.getElementById('noPrizes');
            const wrapper = document.getElementById('wheelWrapper');

            if (!prizes || prizes.length === 0) {
                noPrizes.style.display = 'block';
                wrapper.classList.remove('show');
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                return;
            }

            noPrizes.style.display = 'none';
            wrapper.classList.add('show');
            ctx.clearRect(0, 0, w, h);

            // 1. رسم العجلة ذات القطاعات المتناوبة
            const total = prizes.length;
            const step = (2 * Math.PI) / total;

            // رسم ظل خارجي مضيء أسفل العجلة
            ctx.shadowColor = 'rgba(255, 215, 0, 0.2)';
            ctx.shadowBlur = 50;
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fill();
            ctx.shadowBlur = 0;

            prizes.forEach((p, i) => {
                const start = i * step + rotation - Math.PI / 2;
                const end = start + step;
                const isHighlight = (i === highlightIndex);

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, start, end);
                ctx.closePath();

                // أنظمة الألوان المتناوبة (أزرق داكن، ذهبي فاتح)
                const color1 = isHighlight ? '#ffdd00' : (i % 2 === 0 ? '#1f3050' : '#f0e6cb');
                const color2 = isHighlight ? '#ff8800' : (i % 2 === 0 ? '#0a1220' : '#d0c098');
                const grad = ctx.createRadialGradient(cx - r*0.15, cy - r*0.15, 0, cx, cy, r);
                grad.addColorStop(0, isHighlight ? '#fff8b0' : color1);
                grad.addColorStop(1, color2);
                ctx.fillStyle = grad;
                ctx.fill();

                // خطوط فواصل مضيئة
                ctx.strokeStyle = isHighlight ? '#ffffff' : 'rgba(255, 215, 0, 0.3)';
                ctx.lineWidth = isHighlight ? 3 : 1.5;
                ctx.stroke();

                // النصوص
                const mid = start + step / 2;
                const tr = r * 0.62;
                const x = cx + Math.cos(mid) * tr;
                const y = cy + Math.sin(mid) * tr;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(mid + (mid > Math.PI / 2 ? Math.PI : 0));
                const txtColor = isHighlight ? '#000' : (i % 2 === 0 ? '#fff' : '#0a1220');
                ctx.fillStyle = txtColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = isHighlight ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 10;
                ctx.font = '28px sans-serif';
                ctx.fillText(p.icon || '🎁', 0, -12);
                ctx.font = 'bold 15px sans-serif';
                ctx.shadowBlur = 5;
                let displayText = p.name || 'جائزة';
                if (displayText.length > 10) displayText = displayText.substring(0,10) + '..';
                ctx.fillText(displayText, 0, 22);
                ctx.shadowBlur = 0;
                ctx.restore();
            });

            // 2. الإطار الخارجي المزدوج
            ctx.save();
            ctx.beginPath(); ctx.arc(cx, cy, r + 8, 0, 2 * Math.PI);
            ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 4; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 15; ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, r + 14, 0, 2 * Math.PI);
            ctx.strokeStyle = '#8b6914'; ctx.lineWidth = 3; ctx.shadowBlur = 5; ctx.stroke();
            ctx.restore();

            // 3. أضواء الإطار المتحركة (Chase Light) + المسامير الثابتة
            const numLights = 20;
            for(let i = 0; i < numLights; i++) {
                const angle = (i / numLights) * 2 * Math.PI - Math.PI / 2;
                const lx = cx + Math.cos(angle) * (r + 11);
                const ly = cy + Math.sin(angle) * (r + 11);
                
                // تحديد موقع الضوء الحالي المتوهج بناءً على الـ offset
                const isLit = (i === Math.floor(lightFrameOffset) % numLights);
                
                ctx.save();
                ctx.shadowColor = isLit ? '#ffd700' : 'transparent';
                ctx.shadowBlur = isLit ? 25 : 0;
                
                // رسم المسامير الدائرية
                ctx.beginPath(); ctx.arc(lx, ly, 6, 0, 2 * Math.PI);
                if (isLit) {
                    // عندما يضيء، لون أبيض ذهبي
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 35;
                } else {
                    // عندما يطفأ، لون نحاسي داكن
                    ctx.fillStyle = '#6b5a3e';
                    ctx.shadowBlur = 0;
                }
                ctx.fill();
                ctx.restore();

                // لمعان صغير في منتصف كل مسمار
                if (!isLit) {
                    ctx.beginPath(); ctx.arc(lx-1, ly-1, 2, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
                }
            }

            // تحديث الـ Offset لتحريك الأضواء
            lightFrameOffset = (lightFrameOffset + 0.06); // سرعة دوران الضوء

            // 4. مركز العجلة (القطعة المعدنية الدائرية)
            const centerR = r * 0.17;
            ctx.save();
            ctx.shadowColor = 'rgba(255, 215, 0, 0.3)'; ctx.shadowBlur = 30;
            // تدرج معدني ثلاثي الأبعاد
            const gradCenter = ctx.createRadialGradient(cx - 4, cy - 6, 2, cx, cy, centerR);
            gradCenter.addColorStop(0, '#fff5d1');
            gradCenter.addColorStop(0.3, '#fceabb');
            gradCenter.addColorStop(0.7, '#d4af37');
            gradCenter.addColorStop(1, '#a87f16');
            ctx.beginPath(); ctx.arc(cx, cy, centerR, 0, 2 * Math.PI);
            ctx.fillStyle = gradCenter;
            ctx.fill();
            ctx.strokeStyle = '#fff5d1'; ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // نقطة لمعان (Specular Highlight)
            ctx.beginPath(); ctx.ellipse(cx - 5, cy - 8, 8, 3, -0.3, 0, 2*Math.PI);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.fill();
            ctx.restore();

            // رسم أيقونة المركز بخط عريض واضح
            ctx.fillStyle = '#0a0a0a';
            ctx.font = 'bold 28px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const centerIcon = settingsCache.center_icon || '🎯';
            ctx.fillText(centerIcon, cx + 1, cy + 2);
        }

        // حلقة دوران الأضواء
        function startLightLoop() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            function loop() {
                if (prizesCache && prizesCache.length > 0) {
                    drawWheel(prizesCache, -1, currentRotation);
                }
                animationFrameId = requestAnimationFrame(loop);
            }
            loop();
        }

                if (data.success) {
                    settingsCache = data.settings;
                    if (settingsCache.spin_duration) spinDuration = parseInt(settingsCache.spin_duration) || 3500;
                    document.getElementById('editBgImage').value = settingsCache.bg_image_url || '';

                    document.getElementById('editIsActive').checked = settingsCache.is_active === 'true';
                    document.getElementById('editDepositRequired').checked = settingsCache.deposit_required === 'true';
                    document.getElementById('editDepositMin').value = settingsCache.deposit_min_amount || 1000;
                    return data.settings;
                }
                return {};

        }

                    method: 'PUT',

        // ================================================================
        //                      عرض لوحة الإدارة
        // ================================================================
        async function renderAdminPanel() {
            const panel = document.getElementById('adminPanel');
            const list = document.getElementById('prizesList');
            if (USER_ID !== ADMIN_ID) { panel.classList.remove('show'); return; }
            panel.classList.add('show');
            const prizes = await loadAdminPrizes();
            if (!prizes || prizes.length === 0) {
                list.innerHTML = `<div style="color:#555;font-size:13px;text-align:center;padding:20px;"><div style="font-size:30px;">📭</div>لا توجد جوائز</div>`;
                return;
            }
            list.innerHTML = prizes.map((p, index) => `
                        <div class="prize-item" data-id="${p.id}" data-index="${index}">
                            <div class="prize-icon-small">${p.icon || '🎁'}</div>
                            <div class="prize-info">
                                <input type="text" class="name-input" value="${p.name}" placeholder="اسم الجائزة">
                                <input type="text" class="desc-input" value="${p.description || ''}" placeholder="الوصف (يظهر للجمهور)">
                            </div>
                            <div class="prize-prob">
                                <input type="number" class="prob-input" value="${p.probability}" min="0" max="100" step="0.1"><span class="prob-label">%</span>
                                <button class="btn-save-prob" data-id="${p.id}">💾</button>
                            </div>
                            <div class="prize-colors">
                                <input type="color" class="color-input" value="${p.color || '#1f3050'}" data-field="color" data-id="${p.id}">
                                <input type="color" class="color-input" value="${p.color2 || '#0a1220'}" data-field="color2" data-id="${p.id}">
                            </div>
                            <button class="btn-delete" data-id="${p.id}">✕</button>
                        </div>
                    `).join('');
            // Attach Admin Events...
            list.querySelectorAll('.name-input').forEach(input => {
                input.addEventListener('change', async function() {
                    if(await updatePrize(parseInt(this.closest('.prize-item').dataset.id), { name: this.value.trim() })) { await refreshAll(); showNotification('✅ تم تحديث الاسم'); }
                });
            });
            list.querySelectorAll('.btn-save-prob').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const item = this.closest('.prize-item');
                    if(await updatePrize(parseInt(item.dataset.id), { probability: parseFloat(item.querySelector('.prob-input').value) })) { await refreshAll(); showNotification('✅ تم حفظ النسبة'); }
                });
            });
            list.querySelectorAll('.color-input').forEach(input => {
                input.addEventListener('change', async function() {
                    const id = parseInt(this.dataset.id); const updateData = {}; updateData[this.dataset.field] = this.value;
                    if(await updatePrize(id, updateData)) { await refreshAll(); showNotification('✅ تم تحديث اللون'); }
                });
            });
            list.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const id = parseInt(this.dataset.id);
                    if (confirm('⚠️ هل أنت متأكد من الحذف؟')) {
                        if(await deletePrize(id)) { await refreshAll(); showNotification('✅ تم الحذف'); }
                    }
                });
            });
        }

        async function loadPrizes() {
            try {
                const res = await connectionManager.fetchWithRetry(`${API_BASE}/api/prizes`);
                const data = await res.json();
                if (data.success && data.prizes && data.prizes.length > 0) {
                    prizesCache = data.prizes; return data.prizes;
                }
                return [];
            } catch (e) { console.error('Error loading prizes:', e); showError('فشل تحميل الجوائز'); return []; }
        }

        async function loadUserStatus() {
            if (!USER_ID) return;
            try {
                const res = await connectionManager.fetchWithRetry(`${API_BASE}/api/wheel/history/${USER_ID}`);
                const data = await res.json();
                if (data.success) {
                    const spinBtn = document.getElementById('spinBtn');
                    const canSpin = data.spin_status?.can_spin !== false;
                    if (canSpin && prizesCache.length > 0) {
                        spinBtn.disabled = false; document.getElementById('spinBtnText').textContent = 'دَوِّر العجلة!';
                    } else if (!data.spin_status?.can_spin) {
                        spinBtn.disabled = true;
                        const h = data.spin_status?.remaining_hours || 0; const m = data.spin_status?.remaining_minutes || 0;
                        document.getElementById('spinBtnText').textContent = `⏳ ${h}h ${m}m`;
                    }
                }
            } catch (e) { console.error('Error loading user status:', e); }
        }

        async function refreshAll() {
            await loadSettings();
            const prizes = await loadPrizes();
            if (prizes.length > 0) {
                prizesCache = prizes;
                if (!animationFrameId) startLightLoop();
                else drawWheel(prizes, -1, currentRotation);
            }
            await loadUserStatus();
            await renderAdminPanel();
        }

        // ================================================================
        //                      تأثيرات والدوران
        // ================================================================
        function createConfetti(count = 60) {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#FFD700', '#FF6B00', '#FF0000', '#00FF00', '#00BFFF', '#FF00FF', '#FF69B4'];
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.width = (6 + Math.random() * 14) + 'px'; el.style.height = (6 + Math.random() * 14) + 'px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.left = Math.random() * 100 + '%'; el.style.top = Math.random() * 40 + '%';
                el.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
                container.appendChild(el);
            }
            setTimeout(() => { container.innerHTML = ''; }, 3500);
        }

        function showNotification(message) {
            const bar = document.getElementById('notificationBar');
            document.getElementById('notifPrizeName').textContent = message.replace('🎉 مبروك! لقد فزت بـ ', '').replace('!', '');
            bar.classList.add('show');
            setTimeout(() => { bar.classList.remove('show'); }, 4000);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            document.getElementById('errorText').textContent = '❌ ' + msg;
            el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showLoading(show) {
            const screen = document.getElementById('loadingScreen');
            const wrapper = document.getElementById('wheelWrapper');
            if (show) { screen.classList.add('active'); wrapper.classList.remove('show'); } 
            else { screen.classList.remove('active'); wrapper.classList.add('show'); }
        }

        function updateLoading(progress) {
            document.getElementById('loaderProgressBar').style.width = progress + '%';
            document.getElementById('loaderStatusText').textContent = progress + '%';
        }

        // ================================================================
        //                      تدوير العجلة (Motion Logic)
        // ================================================================
        async function spinWheel() {
            if (isSpinning || !USER_ID || document.getElementById('spinBtn').disabled || prizesCache.length === 0) return;

            isSpinning = true;
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true; spinBtn.classList.add('loading');
            document.getElementById('spinBtnText').textContent = 'جاري التدوير...';
            document.getElementById('resultBox').classList.remove('show'); document.getElementById('errorMsg').classList.remove('show');

            soundManager.init(); soundManager.playStartSound(); soundManager.playSpinSound();

            try {
                const response = await connectionManager.fetchWithRetry(`${API_BASE}/api/wheel/spin`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: USER_ID })
                });
                const data = await response.json();
                spinBtn.classList.remove('loading');

                if (data.success) {
                    const prize = data.spin.prize;
                    const step = (2 * Math.PI) / prizesCache.length;
                    const prizeIndex = prizesCache.findIndex(p => p.id === prize.id);
                    const isWin = !prize.name.includes('حظ سعيد');
                    const idx = prizeIndex > -1 ? prizeIndex : Math.floor(Math.random() * prizesCache.length);

                    // حساب الزاوية للوصول للجائزة الصحيحة
                    const targetAngle = (idx / prizesCache.length) * 2 * Math.PI;
                    // 5 لفات كاملة + الوصول للقطاع + قلب الاتجاه للوصول من الأعلى (السهم)
                    const totalRotation = currentRotation + (5 * 2 * Math.PI) + (2 * Math.PI - targetAngle - (step/2));

                    // إيقاف حلقة الأضواء أثناء الدوران لتوفير الأداء
                    if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }

                    const duration = spinDuration;
                    const startRotation = currentRotation;
                    const startTime = performance.now();

                    function animateSpin(time) {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const easedProgress = 1 - Math.pow(1 - progress, 3);
                        const currentAngle = startRotation + (totalRotation - startRotation) * easedProgress;
                        currentRotation = currentAngle;
                        
                        // رسم سريع للدوران دون الأضواء المتحركة
                        drawWheel(prizesCache, -1, currentAngle);

                        if (progress < 1) {
                            requestAnimationFrame(animateSpin);
                        } else {
                            currentRotation = totalRotation;
                            // إعادة تشغيل الأضواء
                            startLightLoop(); 
                            drawWheel(prizesCache, idx, totalRotation);
                            
                            // إظهار النتيجة
                            document.getElementById('prizeDesc').textContent = prize.description || prize.name || 'جائزة!';
                            document.getElementById('resultBox').classList.add('show');
                            soundManager.stopAll();

                            if (isWin) {
                                createConfetti(60);
                                soundManager.playWinSound();
                            } else {
                                soundManager.playLoseSound();
                            }
                            loadUserStatus();
                        }
                    }
                    requestAnimationFrame(animateSpin);
                } else {
                    showError(data.error || 'حدث خطأ');
                    drawWheel(prizesCache, -1, currentRotation);
                    soundManager.stopAll();
                }
            } catch (e) {
                spinBtn.classList.remove('loading');
                showError('خطأ في الاتصال: ' + e.message);
                drawWheel(prizesCache, -1, currentRotation);
                soundManager.stopAll();
            }
            isSpinning = false;
            if (!document.getElementById('spinBtn').disabled) document.getElementById('spinBtnText').textContent = 'دَوِّر العجلة!';
        }

        // ================================================================
        //                      التهيئة
        // ================================================================
        async function init() {
            USER_ID = getUserId();
            if (!USER_ID) { document.getElementById('errorContainer').classList.add('show'); return; }

            showLoading(true);
            try {
                await new Promise(r => setTimeout(r, 500));
                await loadSettings();
                const prizes = await loadPrizes();
                if (prizes.length > 0) {
                    prizesCache = prizes;
                    drawWheel(prizes, -1, 0);
                    startLightLoop(); // بدء دوران الأضواء
                }
                await loadUserStatus();
                await renderAdminPanel();
                soundManager.init();
            } catch (e) { console.error('Init error:', e); showError('⚠️ فشل تحميل البيانات'); }
            showLoading(false);
            document.getElementById('spinBtn').onclick = spinWheel;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
